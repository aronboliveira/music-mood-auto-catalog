<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mood Assignments Checker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="moods-checks.css" />
  </head>
  <body>
    <div id="app" class="container-fluid py-3 px-3">
      <!-- ── Header ───────────────────────────────────────── -->
      <h1 class="mb-3">Mood Assignments Checker</h1>

      <!-- ── CTA bar (sticky) ─────────────────────────────── -->
      <div class="cta-bar mb-3">
        <button class="btn btn-primary btn-sm" @click="exportJson">
          Export JSON
        </button>
        <button class="btn btn-outline-light btn-sm" @click="copyYaml">
          Copy YAML
        </button>
        <button class="btn btn-outline-danger btn-sm" @click="clearStorage">
          Clear saved
        </button>
        <span v-if="statusMsg" class="badge bg-success ms-2"
          >{{ statusMsg }}</span
        >
        <span v-if="autosaveMsg" class="autosave-indicator ms-2"
          >{{ autosaveMsg }}</span
        >
      </div>

      <!-- ── Search ───────────────────────────────────────── -->
      <div class="search-bar mb-3">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Search tracks…"
          v-model="searchQuery"
        />
      </div>

      <!-- ── Progress ─────────────────────────────────────── -->
      <div class="mb-3">
        <div class="d-flex justify-content-between small mb-1">
          <span>Reviewed: {{ reviewedCount }} / {{ totalTracks }}</span>
          <span>{{ reviewedPct }}%</span>
        </div>
        <div class="progress" style="height: 8px">
          <div
            class="progress-bar bg-success"
            role="progressbar"
            :style="{ width: reviewedPct + '%' }"
            :aria-valuenow="reviewedPct"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>

      <!-- ── Tracks ───────────────────────────────────────── -->
      <details
        v-for="track in filteredTracks"
        :key="track"
        class="track-details"
        :class="{ 'is-reviewed': trackState[track].reviewed }"
        :open="trackState[track].open || undefined"
        @toggle="onToggle(track, $event)"
      >
        <summary>
          <input
            type="checkbox"
            class="reviewed-cb"
            :checked="trackState[track].reviewed"
            @click.stop="toggleReviewed(track)"
            title="Mark as reviewed"
          />
          <span class="track-label">{{ displayName(track) }}</span>
        </summary>
        <div class="mood-grid">
          <label
            v-for="mood in allMoods"
            :key="mood"
            class="mood-label"
            :title="mood"
          >
            <input
              type="checkbox"
              :checked="hasMood(track, mood)"
              @change="toggleMood(track, mood)"
              :style="{ accentColor: moodColor(mood) }"
            />
            <span>{{ mood }}</span>
          </label>
        </div>
      </details>
    </div>

    <!-- ── Scripts ─────────────────────────────────────────── -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="moods-checks-data.js"></script>
    <script src="moods-checks-app.js"></script>
  </body>
</html>
